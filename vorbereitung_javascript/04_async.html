function makeRequest(file) {
    return new Promise( (resolve, reject) => {
        console.log('making request for ' + file);
        if(file == 'index.html') { 
            resolve('index.html exists')
        } else {
            reject(file + ' does not exist')
        }
    });
}




// hier ist keine Fall Unterscheidung, immer resolve Ausgabe
function processRequest(response) {
    return new Promise( (resolve, reject) => {
        console.log('processing response');
        resolve('processing done for ' + response)
    })
}

function testPromises(file) {
    makeRequest(file)               // resolve-Fall
    //.then wird nur dan Ausgerufen, wenn resolve Auftritt (resolve ist das gleiche wie .then ??)
    .then( response => {
        console.log('response received'); //wir haben resolve erhalten, für uns ausgeben
        console.log(response)           //gebe das aus, was wir in resolve vom Promise auszugeben soll
        return processRequest(response) //Promise zurück
    })
    .then( processedResponse => {
        console.log(processedResponse) //wir behandeln den resolve-Fall aus (kA was gemeint ist?)
    })
    .catch( error => console.log("Fehler : ", error)) //der reject-Fall
}

testPromises('index.html')











async function fetchTest() {

    try {
        let response = await fetch('https://jsonplaceholder.typicode.com/posts1');
        console.log(response); 
        //ist nicht der reject Fall mit !response.ok
        if (!response.ok) {
            throw new Error(`HTTP-Fehler: ${response.status}`);
        }
        let body = await response.json();
        console.log("body : ", body)
        //let value = body.origin;
        //console.log(value)
    }catch(error) {
        console.log("kein fetch moeglich ", error)
    }

}
