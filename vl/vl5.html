<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- Unsere Verbindung zur Hardware, Breite des Gerätes --> 
    <title>Media Queries</title>
    <style>
        body {

            margin: 0;
        }

        div {
            width: 100vw;
            height: 100vh;
            text-align: center;
            background-color: red;
            padding-top: 20%;
            padding-bottom: 20%;
            font-size: medium;
        }
        
        /* wenn der Screen die 800px erreicht, dann tretten diese Eigenschaften ein, blauer Gintergrund usw.. */
       /* @media screen and (min-width: 800px) and (max-width: 1200px) (Variante 1) */
        @media (800px <= width < 1200px) /*Variante 2 ohne Screen nach @media die breite muss größer sein als 800 aber größer als 1200 sein */ {

            div {
                background-color: blue;
                color: white;
            }

        }
   @media screen and (min-width: 1200px) /* Variante 2 @media (1200px <= width */{

            div {
                background-color: yellow;
                color: brown;
                font-size: xx-large;
            }

        }
        @media screen and (orientation: portrait) {
         div {
            font-weight: bold;
            writing-mode: vertical-lr;
            text-align: center;
            padding: 25%;
        }
        }


    </style>
</head>

<body>
    <div>Ändern Sie die Breite des Browsers, um den Effekt zu sehen.</div>
</body>

</html>
